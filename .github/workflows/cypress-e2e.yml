name: Cypress E2E
on: [push]

jobs:
  cypress-run:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: cypress-io/github-action@v6
        with:
          install-command: npm install
          start: npm start
          wait-on: http://localhost:3000
          wait-on-timeout: 180
          browser: chrome